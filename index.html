<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>山手線すごろく</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 10px;
            overflow-x: hidden;
            background: linear-gradient(135deg, #1e1f29, #2e3250);
            color: #fff;
            -webkit-tap-highlight-color: transparent;
        }
        h1 { margin: 10px 0; font-size: 1.3rem; text-shadow: 0 0 10px rgba(128,195,66,0.8); }
        #settings {
            margin-bottom: 10px;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 10px;
            font-size: 0.9rem;
        }
        select {
            padding: 5px;
            border-radius: 5px;
            border: none;
            background: #fff;
            color: #333;
        }
        #board-container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            aspect-ratio: 600 / 420;
            position: relative;
        }
        #board {
            width: 100%;
            height: 100%;
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(128, 195, 66, 0.3);
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }
        .station {
            position: absolute;
            width: 10%;
            height: 14.28%;
            font-size: clamp(7px, 2vw, 11px);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fff;
            color: #333;
            border-radius: 4px;
            font-weight: bold;
            box-sizing: border-box;
            border: 1px solid #ccc;
            z-index: 10;
        }
        .current-station {
            background: #80C342 !important;
            color: white !important;
            transform: scale(1.1);
            box-shadow: 0 0 15px #80C342;
            z-index: 11;
        }
        .rail { position: absolute; background: repeating-linear-gradient(90deg, #333 0 10px, #eee 10px 15px); z-index: 1; }
        .rail-top { top: 6.5%; left: 5%; width: 90%; height: 4px; }
        .rail-bottom { bottom: 6.5%; left: 5%; width: 90%; height: 4px; }
        .rail-left { top: 5%; left: 4.5%; width: 4px; height: 90%; background: repeating-linear-gradient(0deg, #333 0 10px, #eee 10px 15px); }
        .rail-right { top: 5%; right: 4.5%; width: 4px; height: 90%; background: repeating-linear-gradient(0deg, #333 0 10px, #eee 10px 15px); }
        #marker {
            position: absolute;
            width: 8%;
            height: 12%;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #trainImg { width: 100%; height: 100%; object-fit: contain; }
        #dice-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        #diceImg { width: 60px; height: 60px; display: block; margin: 0 auto 10px; border-radius: 8px; }
        #diceBtn {
            padding: 10px 20px;
            background: #80C342;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 3px #5a8a2e;
        }
        #diceBtn:disabled { background: #666; box-shadow: none; }
        .star-container { position: fixed; width: 100%; height: 100%; top:0; left:0; z-index: -1; }
        .star { position: absolute; border-radius: 50%; background: white; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="star-container" id="starContainer"></div>
    <h1>山手線すごろく</h1>

    <div id="settings">
        始発駅を設定：
        <select id="startStationSelect"></select>
        <p style="margin: 5px 0 0 0;">現在の駅：<span id="currentStation">新宿</span></p>
    </div>

    <div id="board-container">
        <div id="board">
            <div id="dice-container">
                <img id="diceImg" src="dice1.png" alt="🎲">
                <button id="diceBtn">サイコロを振る</button>
            </div>
            <div class="rail rail-top"></div>
            <div class="rail rail-bottom"></div>
            <div class="rail rail-left"></div>
            <div class="rail rail-right"></div>
            <div id="marker"><img id="trainImg" src="train.png" alt="🚃"></div>
        </div>
    </div>

    <script>
        const stations = [
            "新宿", "新大久保", "高田馬場", "目白", "池袋", "大塚", "巣鴨", "駒込", "田端", "西日暮里",
            "日暮里", "鶯谷", "上野", "御徒町", "秋葉原", "神田", "東京", "有楽町", "新橋", "浜松町",
            "田町", "高輪GW", "品川", "大崎", "五反田", "目黒", "恵比寿", "渋谷", "原宿", "代々木"
        ];

        const board = document.getElementById("board");
        const select = document.getElementById("startStationSelect");
        
        let position = parseInt(localStorage.getItem("yamanote_pos")) || 0;
        let startPosition = parseInt(localStorage.getItem("yamanote_start")) || 0;
        let isMoving = false; // ★移動中かどうかを管理するフラグ

        // 駅の配置 & セレクトボックス生成
        stations.forEach((name, i) => {
            const div = document.createElement("div");
            div.className = "station";
            div.textContent = name;
            let left = 0, top = 0;
            if (i <= 9) { left = i * 10; top = 0; }
            else if (i <= 15) { left = 90; top = (i - 9) * 14.28; }
            else if (i <= 24) { left = 90 - (i - 15) * 10; top = 85.7; }
            else { left = 0; top = 85.7 - (i - 24) * 14.28; }
            div.style.left = left + "%";
            div.style.top = top + "%";
            board.appendChild(div);

            const opt = document.createElement("option");
            opt.value = i;
            opt.textContent = name;
            if (i === startPosition) opt.selected = true;
            select.appendChild(opt);
        });

        // 始発駅を変えた時の処理
        select.addEventListener("change", (e) => {
            if (isMoving) return;
            startPosition = parseInt(e.target.value);
            position = startPosition;
            localStorage.setItem("yamanote_start", startPosition);
            saveAndMove();
        });

        // ★新機能：一駅ずつトコトコ動く魔法
        async function moveOneByOne(steps) {
            isMoving = true;
            diceBtn.disabled = true;
            
            const totalStations = stations.length;
            // 出発駅までの残りマスを計算
            let remaining = (startPosition - position + totalStations) % totalStations;
            if (remaining === 0) remaining = totalStations; 

            let actualStepsTaken = 0;

            for (let i = 0; i < steps; i++) {
                // 出発駅（ゴール）に到達したらストップ
                if (actualStepsTaken > 0 && position === startPosition) break;
                
                position = (position + 1) % totalStations;
                actualStepsTaken++;
                
                saveAndMove(); // 1マスごとに更新
                // 0.4秒待機（ここを長くするともっとゆっくり動くよ）
                await new Promise(resolve => setTimeout(resolve, 400));
            }

            // --- ゴール演出判定 ---
            if (position === startPosition) {
                if (actualStepsTaken === steps) {
                    // 【ぴったり賞】金色の豪華クラッカー！
                    var duration = 4 * 1000;
                    var end = Date.now() + duration;
                    (function frame() {
                      confetti({ particleCount: 10, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#80C342', '#FFD700', '#ffffff'] });
                      confetti({ particleCount: 10, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#80C342', '#FFD700', '#ffffff'] });
                      if (Date.now() < end) { requestAnimationFrame(frame); }
                    }());
                } else {
                    // 【通常ゴール】普通のクラッカー
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#80C342', '#ffffff'] });
                }
            }

            isMoving = false;
            diceBtn.disabled = false;
        }

        function saveAndMove() {
            localStorage.setItem("yamanote_pos", position);
            const marker = document.getElementById("marker");
            const stationDivs = document.querySelectorAll(".station");
            const target = stationDivs[position];
            
            document.getElementById("currentStation").textContent = stations[position];
            stationDivs.forEach(d => d.classList.remove("current-station"));
            target.classList.add("current-station");
            
            marker.style.left = (parseFloat(target.style.left) + 1) + "%";
            marker.style.top = (parseFloat(target.style.top) + 1) + "%";
        }

        const diceBtn = document.getElementById("diceBtn");
        const diceImg = document.getElementById("diceImg");

        diceBtn.addEventListener("click", () => {
            if (isMoving) return;
            diceBtn.disabled = true;
            let count = 0;
            const roll = setInterval(() => {
                diceImg.src = `dice${Math.floor(Math.random() * 6) + 1}.png`;
                count++;
                if (count > 12) {
                    clearInterval(roll);
                    const dice = Math.floor(Math.random() * 6) + 1;
                    diceImg.src = `dice${dice}.png`;

                    // ★「ワープ」から「トコトコ移動」へバトンタッチ
                    moveOneByOne(dice);
                }
            }, 80);
        });

        // 背景の星
        for (let i = 0; i < 40; i++) {
            const star = document.createElement("div");
            star.className = "star";
            star.style.width = star.style.height = Math.random() * 2 + "px";
            star.style.left = Math.random() * 100 + "vw";
            star.style.top = Math.random() * 100 + "vh";
            document.getElementById("starContainer").appendChild(star);
        }

        saveAndMove();
    </script>
</body>
</html>
